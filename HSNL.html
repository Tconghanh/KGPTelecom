<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Năng Lực - Khang Gia Phúc</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@master/lib/turn.min.js"></script>

    <style>
        body {
            background: #333; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; font-family: Arial, sans-serif;
            -webkit-user-select: none; user-select: none;
        }

        /* Vùng chứa sách */
        #viewport {
            width: 90%; height: 85%;
            display: flex; justify-content: center; align-items: center;
        }

        #flipbook {
            display: none; /* Hiện sau khi init xong */
            width: 1000px; height: 700px;
        }

        .page {
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        canvas { width: 100%; height: 100%; display: block; }

        /* Màn hình chờ */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 9999;
        }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #3498db;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media print { body { display: none !important; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="status">Đang tải hồ sơ... 0%</p>
    </div>

    <div id="viewport">
        <div id="flipbook">
            <!-- Pages added by JS -->
        </div>
    </div>

    <script>
        // 1. CẤU HÌNH PDF (Đảm bảo file này nằm cùng thư mục HSNL)
        const PDF_URL = 'ho-so-nang-luc.pdf'; 

        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let pdfDoc = null;
        let renderedPages = new Set();

        async function start() {
            try {
                // Tải PDF
                const loadingTask = pdfjsLib.getDocument(PDF_URL);
                loadingTask.onProgress = (p) => {
                    let per = Math.min(Math.round((p.loaded / p.total) * 100), 99);
                    if (!isNaN(per)) $('#status').text(`Đang tải dữ liệu: ${per}%`);
                };

                pdfDoc = await loadingTask.promise;
                const numPages = pdfDoc.numPages;

                // Lấy kích thước chuẩn từ trang 1
                const firstPage = await pdfDoc.getPage(1);
                const viewport = firstPage.getViewport({ scale: 1.5 });
                const ratio = viewport.width / viewport.height;

                // Tính toán kích thước hiển thị
                const winH = $(window).height() * 0.85;
                const bookH = winH;
                const bookW = bookH * ratio * 2;

                // Tạo các khung trang rỗng ngay lập tức
                for (let i = 1; i <= numPages; i++) {
                    $('#flipbook').append(`<div class="page" id="p${i}"><div style="display:flex; height:100%; align-items:center; justify-content:center; color:#ccc">Đang vẽ trang ${i}...</div></div>`);
                }

                // Khởi tạo Flipbook
                $('#flipbook').show().turn({
                    width: bookW,
                    height: bookH,
                    autoCenter: true,
                    acceleration: true,
                    gradients: true,
                    elevation: 50,
                    when: {
                        turning: function(e, page, view) {
                            // Khi lật đến đâu, vẽ trang đó (Lazy Load)
                            view.forEach(p => { if(p > 0) renderCanvas(p); });
                        }
                    }
                });

                // Vẽ 2 trang đầu
                await renderCanvas(1);
                await renderCanvas(2);

                $('#loading-overlay').fadeOut();

            } catch (err) {
                $('#status').html('<span style="color:red">Lỗi: Không tìm thấy file PDF.<br>Vui lòng kiểm tra file "ho-so-nang-luc.pdf" đã tải lên host chưa.</span>');
            }
        }

        async function renderCanvas(num) {
            if (renderedPages.has(num) || num > pdfDoc.numPages) return;
            renderedPages.add(num);

            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: 2 }); // Tăng nét
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: context, viewport: viewport }).promise;
            $(`#p${num}`).empty().append(canvas);
        }

        // Điều khiển phím mũi tên
        $(window).bind('keydown', function(e) {
            if (e.keyCode == 37) $('#flipbook').turn('previous');
            else if (e.keyCode == 39) $('#flipbook').turn('next');
        });

        // Chặn phím tắt
        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 80 || e.keyCode === 73)) return false;
            if (e.keyCode === 123) return false;
        };

        $(window).ready(start);
    </script>
</body>
</html>
