<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sách Điện Tử - Flipbook PDF</title>
    
    <!-- Thư viện Jquery và Turn.js để tạo hiệu ứng lật sách -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.12.313/pdf.min.js"></script>
    <script src="https://raw.rawgit.com/blasten/turn.js/master/lib/turn.min.js"></script>

    <style>
        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Chống bôi đen văn bản */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #flipbook {
            width: 900px;
            height: 600px;
        }

        .page {
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        #loading {
            position: fixed;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 20px;
        }

        /* Vô hiệu hóa in ấn */
        @media print {
            body { display: none; }
        }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- Chặn chuột phải -->

    <div id="loading">Đang tải sách, vui lòng chờ...</div>
    <div id="flipbook"></div>

    <script>
        // Cấu hình PDF.js
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.12.313/pdf.worker.min.js';

        // Link Proxy để tránh lỗi CORS (Google Drive không cho phép lấy file trực tiếp từ server khác)
        // Lưu ý: ID file lấy từ link của bạn
        const fileId = '1-xF5PRpQQUf93pISxuEVHAkhTTsK0hok';
        const url = `https://corsproxy.io/?https://drive.google.com/uc?export=download&id=${fileId}`;

        async function renderPDF() {
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                const flipbook = $('#flipbook');
                
                document.getElementById('loading').style.display = 'none';

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1.5 });
                    
                    const div = document.createElement('div');
                    div.className = 'page';
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };
                    
                    await page.render(renderContext).promise;
                    div.appendChild(canvas);
                    flipbook.append(div);
                }

                // Khởi tạo hiệu ứng lật sách
                flipbook.turn({
                    width: 1000,
                    height: 700,
                    autoCenter: true,
                    acceleration: true,
                    gradients: true,
                    elevation: 50
                });

            } catch (error) {
                console.error('Lỗi khi tải PDF:', error);
                document.getElementById('loading').innerText = 'Không thể tải file PDF. Hãy kiểm tra quyền chia sẻ file.';
            }
        }

        // Chặn phím tắt (Ctrl+C, Ctrl+U, Ctrl+S, F12)
        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 80)) {
                return false;
            }
            if (e.keyCode === 123) { // F12
                return false;
            }
        };

        renderPDF();
    </script>
</body>
</html>
