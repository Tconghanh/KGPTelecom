<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>HIKVISION CATALOG 2025</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Sử dụng thư viện từ Cloudflare CDN (thường nhanh và ít bị chặn hơn) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dflip/1.0.9/css/dflip.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dflip/1.0.9/css/themify-icons.min.css">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #333; overflow: hidden; font-family: sans-serif; }
        
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 50px;
            background: #fff; display: flex; align-items: center;
            padding: 0 20px; border-bottom: 2px solid #d71920;
            z-index: 1000; box-sizing: border-box;
        }
        .logo { color: #d71920; font-weight: bold; font-size: 20px; text-decoration: none; margin-right: 15px; }
        .title { color: #444; font-size: 13px; font-weight: bold; border-left: 1px solid #ccc; padding-left: 15px; }

        #container { height: calc(100vh - 50px); margin-top: 50px; width: 100%; }

        /* Sửa lỗi màn hình xám bằng cách ép kích thước */
        .df-container { height: 100% !important; background: #222 !important; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">HIKVISION</a>
        <div class="title">CATALOG CCTV 2025 - KHANG GIA PHÚC</div>
    </header>

    <div id="container">
        <!-- Chèn trực tiếp bằng thuộc tính class của DFlip (Cách này ổn định nhất) -->
        <div class="_df_book" 
             source="CatalogHikvision2025.pdf" 
             id="df_book_viewer"
             webgl="true" 
             hard="none">
        </div>
    </div>

    <!-- Script hỗ trợ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dflip/1.0.9/js/dflip.min.js"></script>

    <script>
        // Kiểm tra xem file PDF có tồn tại không trước khi load
        $(document).ready(function() {
            const pdfPath = "CatalogHikvision2025.pdf";
            
            fetch(pdfPath, { method: 'HEAD' })
                .then(res => {
                    if (!res.ok) {
                        console.error("LỖI: Không tìm thấy file " + pdfPath + " trong cùng thư mục!");
                        alert("Không tìm thấy file PDF. Hãy kiểm tra tên file trên hosting.");
                    } else {
                        console.log("File PDF đã sẵn sàng để lật trang.");
                    }
                })
                .catch(err => console.log("Kiểm tra file: ", err));
        });
    </script>

</body>
</html>
