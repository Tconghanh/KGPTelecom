<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KGP Telecom - Final Optimized</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{--primary:#0071ba;--radius:14px}
*{box-sizing:border-box}
body{margin:0;font-family:Roboto,sans-serif;background:#fff}
header{position:fixed;top:0;width:100%;background:#fff;z-index:1000;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.nav{max-width:1300px;margin:auto;display:flex;gap:10px;padding:10px}
.search{flex:1;padding:10px;border-radius:25px;border:1px solid #ddd}
.container{max-width:1300px;margin:auto;padding:90px 15px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
.card{border:1px solid #eee;border-radius:var(--radius);padding:12px;cursor:pointer;transition:.2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,.08)}
.card img{height:170px;object-fit:contain}
.price{color:#d92027;font-weight:700}
button{background:var(--primary);color:#fff;border:none;padding:10px;border-radius:10px;cursor:pointer;margin-top:auto}
.cart{position:fixed;bottom:20px;right:20px;background:#ff8a22;color:#fff;padding:14px;border-radius:50px;cursor:pointer}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center}
.modal-box{background:#fff;padding:25px;border-radius:20px;max-width:900px;width:95%;max-height:90vh;overflow:auto}
.skeleton{height:220px;background:#eee;border-radius:12px;animation:pulse 1.2s infinite}
@keyframes pulse{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}
.slider{width:100%;height:260px;overflow:hidden;margin-top:60px}
.slider img{width:100%;height:100%;object-fit:cover}
</style>
</head>

<body>
<header>
<div class="nav">
<input id="search" class="search" placeholder="Tìm sản phẩm...">
</div>
</header>

<div class="slider">
<img id="slideImg" loading="lazy" src="https://khanggiaphuc.com/data/SL1.jpg">
</div>

<div class="container">
<div id="grid" class="grid"></div>
</div>

<div class="cart" id="cartBtn">🛒 <span id="count">0</span></div>

<div id="modal" class="modal">
<div class="modal-box">
<h2 id="m-title"></h2>
<img id="m-img" style="width:100%;height:250px;object-fit:contain">
<div id="m-price"></div>
<ul id="m-spec"></ul>
<button id="addModal">Thêm vào giỏ</button>
</div>
</div>

<script>
const CACHE_TIME=1800000;
const sheetId='1knLdhA1j69Qqfa6nMIe20vfufQnvGr4THpehnK0mHPk';
const imgBase='https://khanggiaphuc.com/data/';

let products=[];
let cart=JSON.parse(localStorage.getItem('cart')||'[]');
let current=null;

// slider
let slide=1;
setInterval(()=>{
 slide=slide%6+1;
 document.getElementById('slideImg').src=`${imgBase}SL${slide}.jpg`;
},4000);

async function fetchSheet(name){
 const key='cache_'+name;
 const cache=localStorage.getItem(key);
 if(cache){
  const obj=JSON.parse(cache);
  if(Date.now()-obj.time<CACHE_TIME) return obj.data;
 }
 const res=await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${name}`);
 const txt=await res.text();
 const json=JSON.parse(txt.substring(47).slice(0,-2));
 const data=json.table.rows;
 localStorage.setItem(key,JSON.stringify({time:Date.now(),data}));
 return data;
}

function skeleton(){
 grid.innerHTML=Array(12).fill('<div class="skeleton"></div>').join('');
}

function render(list){
 grid.innerHTML=list.map(p=>`
 <div class="card" data-id="${p.ma}">
 <img loading="lazy" src="${imgBase}${p.ma}.jpg">
 <h4>${p.ten}</h4>
 <div class="price">${p.gia>0?p.gia.toLocaleString()+'đ':'Liên hệ'}</div>
 <button data-id="${p.ma}">Thêm giỏ</button>
 </div>`).join('');
}

async function init(){
 skeleton();
 const data=await fetchSheet('San_Pham');
 products=data.map(r=>({
  ma:r.c[0]?.v||'',
  ten:r.c[1]?.v||'',
  gia:r.c[3]?.v||0,
  mota:r.c[4]?.v||''
 })).filter(p=>p.ma);
 render(products);
 updateCart();
}

search.oninput=e=>{
 const k=e.target.value.toLowerCase();
 const f=products.filter(p=>p.ten.toLowerCase().includes(k));
 render(f.map(p=>({...p,ten:p.ten.replace(new RegExp(k,'gi'),m=>`<mark>${m}</mark>`)})));
}

document.addEventListener('click',e=>{
 if(e.target.closest('.card') && !e.target.matches('button')){
  openModal(e.target.closest('.card').dataset.id);
 }
 if(e.target.matches('button[data-id]')){
  addToCart(e.target.dataset.id);
 }
});

modal.onclick=e=>{if(e.target===modal)modal.style.display='none'};
addModal.onclick=()=>{if(current)addToCart(current.ma)};
cartBtn.onclick=()=>alert('Tổng: '+cart.reduce((s,i)=>s+i.qty,0));

function openModal(id){
 const p=products.find(x=>x.ma==id);
 if(!p)return;
 current=p;
 m-title.innerText=p.ten;
 m-img.src=imgBase+p.ma+'.jpg';
 m-price.innerText=p.gia>0?p.gia.toLocaleString()+'đ':'Liên hệ';
 m-spec.innerHTML=p.mota.split('\n').map(l=>`<li>${l}</li>`).join('');
 modal.style.display='flex';
}

function addToCart(id){
 const p=products.find(x=>x.ma==id);
 const ex=cart.find(x=>x.ma==id);
 if(ex) ex.qty++; else cart.push({...p,qty:1});
 localStorage.setItem('cart',JSON.stringify(cart));
 updateCart();
}

function updateCart(){
 count.innerText=cart.reduce((s,i)=>s+i.qty,0);
}

init();
</script>

</body>
</html>
