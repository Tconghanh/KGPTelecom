    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    
    <style>
        /* GIỮ NGUYÊN CSS GỐC CỦA BẠN */
        :root {
            --primary: #0071ba; --primary-dark: #005a96; --price-red: #d92027;
            --btn-orange: #ff8a22; --dark-gray: #2d3436; --light-gray: #636e72;
            --light-bg: #f8fafc; --white: #ffffff; --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
            --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Roboto', sans-serif; line-height: 1.6; color: var(--dark-gray); background: #fff; overflow-x: hidden; }

        header { background: rgba(255,255,255,0.96); backdrop-filter: blur(15px); box-shadow: var(--shadow-sm); position: fixed; width: 100%; top: 0; z-index: 1000; height: 70px; display: flex; align-items: center; }
        nav { max-width: 1400px; margin: auto; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; width: 100%; gap: 10px; }
        .nav-left { display: flex; align-items: center; gap: 10px; flex: 1; }
        h1.logo-wrap { margin: 0; line-height: 0; }
        .logo img { height: 42px; width: auto; transition: 0.3s; }
        
        .search-container { position: relative; flex: 1; max-width: 350px; }
        .search-box input { width: 100%; padding: 10px 40px 10px 15px; border-radius: 25px; border: 1.5px solid #eee; outline: none; font-size: 0.85rem; transition: 0.3s; background: #f1f5f9; height: 40px; }
        .search-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); cursor: pointer; }
        
        /* Tối ưu hiệu năng cho Marquee */
        .marquee { display: flex; width: max-content; animation: scroll 40s linear infinite; gap: 20px; will-change: transform; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* Các Styles còn lại giữ nguyên... */
        .slider-container { width: 100%; height: 500px; margin-top: 70px; overflow: hidden; position: relative; background: #eee; }
        .slider { display: flex; width: 100%; height: 100%; transition: transform 1s cubic-bezier(0.65, 0, 0.35, 1); }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        section { padding: 60px 20px; max-width: 1300px; margin: auto; scroll-margin-top: 80px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }
        .product-card { background: var(--white); border: 1px solid #f1f5f9; border-radius: var(--radius); padding: 15px; text-align: center; transition: 0.3s; box-shadow: var(--shadow-sm); }
        .product-card img { width: 100%; height: 180px; object-fit: contain; }
        
        @media (max-width: 768px) {
            .slider-container { height: 220px; }
            .modal-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
