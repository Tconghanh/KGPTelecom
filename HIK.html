<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Hikvision CCTV Catalog 2025 - Bản lật trang 3D</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS của thư viện lật trang chuyên nghiệp -->
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.9/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.9/css/themify-icons.min.css" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        
        /* Header kiểu Hikvision */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 55px;
            background: #ffffff; display: flex; align-items: center;
            padding: 0 20px; border-bottom: 3px solid #d71920;
            z-index: 1000; box-sizing: border-box;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .logo { color: #d71920; font-weight: bold; font-size: 22px; text-decoration: none; }
        .divider { width: 1px; height: 25px; background: #ddd; margin: 0 15px; }
        .title { color: #333; font-size: 14px; font-weight: bold; text-transform: uppercase; }

        /* Container cho Flipbook */
        #flipbook-container {
            height: calc(100vh - 55px);
            margin-top: 55px;
        }

        /* Tùy chỉnh thanh điều khiển (Toolbar) */
        .df-ui-controls { background: rgba(255, 255, 255, 0.9) !important; color: #333 !important; }
        .df-ui-btn { color: #333 !important; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">HIKVISION</a>
        <div class="divider"></div>
        <div class="title">CCTV CATALOG 2025 - ONLINE EDITION</div>
    </header>

    <div id="flipbook-container">
        <!-- Flipbook sẽ hiển thị tại đây -->
        <div id="my-flipbook"></div>
    </div>

    <!-- Script cần thiết -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.9/js/dflip.min.js"></script>

    <script>
        $(document).ready(function () {
            // Link file gốc của bạn
            var originalPdfUrl = "https://www.khanggiaphuc.com/data/CatalogHikvision2025.pdf";
            
            // Sử dụng Proxy để vượt rào cản CORS (Bắt buộc để load được PDF từ server khác)
            var proxiedPdfUrl = "https://corsproxy.io/?" + encodeURIComponent(originalPdfUrl);

            // Cấu hình hiệu ứng lật trang giống trang Hikvision
            var options = {
                height: 2000,
                duration: 800,
                hard: "none", // Trang giấy mềm mại
                webgl: true,  // Bật 3D (Nếu máy yếu sẽ tự chuyển sang 2D)
                pageMode: 2,  // Xem 2 trang cùng lúc trên PC
                singlePageMode: 1, // 1 trang trên Mobile
                backgroundColor: "#1a1a1a",
                // Các nút chức năng
                allControls: "pageNumber,zoomin,zoomout,fullScreen,download,thumbnail,search,outline",
                hideControlControls: "share,facebook,twitter",
                // mượt mà hơn
                scrollWheel: true,
                autoPlay: false,
                autoPlayDuration: 3000
            };

            // Khởi tạo Flipbook
            $("#my-flipbook").flipBook(proxiedPdfUrl, options);
        });
    </script>

</body>
</html>
